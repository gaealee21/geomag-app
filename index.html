<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>지구자기장 분석기</title>
    <style>
        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f4f6f9;
            color: #333;
            margin: 0;
            padding: 15px;
            box-sizing: border-box;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #1a73e8;
            font-size: 1.5rem;
            margin-bottom: 20px;
        }
        .card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .card h2 {
            font-size: 1.2rem;
            margin-top: 0;
            margin-bottom: 15px;
            border-bottom: 2px solid #e8eaed;
            padding-bottom: 10px;
            color: #202124;
        }
        .input-group {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        label {
            font-weight: 600;
            font-size: 0.95rem;
            flex: 1;
        }
        input[type="number"] {
            flex: 1.5;
            padding: 10px;
            border: 1px solid #dadce0;
            border-radius: 6px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }
        input[type="number"]:focus {
            border-color: #1a73e8;
        }
        button {
            width: 100%;
            background-color: #1a73e8;
            color: white;
            border: none;
            padding: 14px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 5px;
        }
        button:hover {
            background-color: #1557b0;
        }
        .btn-gps {
            background-color: #34a853;
            margin-bottom: 15px;
        }
        .btn-gps:hover {
            background-color: #2b803e;
        }
        .note {
            font-size: 0.85rem;
            color: #5f6368;
            margin-bottom: 15px;
            line-height: 1.4;
        }
        .result-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        .result-table th, .result-table td {
            border: 1px solid #e8eaed;
            padding: 12px 8px;
            text-align: center;
            font-size: 0.95rem;
        }
        .result-table th {
            background-color: #f8f9fa;
            color: #5f6368;
            font-weight: 600;
        }
        .highlight {
            font-weight: bold;
            color: #1a73e8;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🌍 지구자기장 분석기</h1>

    <div class="card">
        <h2>1. 위치 정보 입력</h2>
        <button class="btn-gps" onclick="getGPS()">📍 현재 내 위치 자동 입력 (GPS)</button>
        <div class="input-group">
            <label>위도 (Latitude)</label>
            <input type="number" id="lat" step="0.0001" placeholder="예: 37.5665">
        </div>
        <div class="input-group">
            <label>경도 (Longitude)</label>
            <input type="number" id="lon" step="0.0001" placeholder="예: 126.9780">
        </div>
    </div>

    <div class="card">
        <h2>2. 측정값 입력 (단위: µT, °)</h2>
        <p class="note">※ Phyphox 앱에서 스마트폰을 8자 모양으로 돌려 영점을 맞춘 후, 평평한 곳에 두고 측정한 값을 입력하세요.</p>
        <div class="input-group">
            <label>X축 (수평)</label>
            <input type="number" id="valX" step="0.1" placeholder="X값 입력">
        </div>
        <div class="input-group">
            <label>Y축 (수평)</label>
            <input type="number" id="valY" step="0.1" placeholder="Y값 입력">
        </div>
        <div class="input-group">
            <label>Z축 (수직)</label>
            <input type="number" id="valZ" step="0.1" placeholder="Z값 입력">
        </div>
        <p class="note" style="margin-top:15px; margin-bottom:5px;">※ 나침반 앱에서 확인한 각도를 입력하세요.</p>
        <div class="input-group">
            <label>편각 (D)</label>
            <input type="number" id="valDec" step="0.1" placeholder="예: -8.5 (서편각은 -)">
        </div>
