<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>지구자기장 분석기</title>
    <style>
        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f4f6f9;
            color: #333;
            margin: 0;
            padding: 15px;
            box-sizing: border-box;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #1a73e8;
            font-size: 1.5rem;
            margin-bottom: 20px;
        }
        .card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .card h2 {
            font-size: 1.2rem;
            margin-top: 0;
            margin-bottom: 15px;
            border-bottom: 2px solid #e8eaed;
            padding-bottom: 10px;
            color: #202124;
        }
        .input-group {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        label {
            font-weight: 600;
            font-size: 0.95rem;
            flex: 1;
        }
        input[type="number"] {
            flex: 1.5;
            padding: 10px;
            border: 1px solid #dadce0;
            border-radius: 6px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }
        input[type="number"]:focus {
            border-color: #1a73e8;
        }
        button {
            width: 100%;
            background-color: #1a73e8;
            color: white;
            border: none;
            padding: 14px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 5px;
        }
        button:hover {
            background-color: #1557b0;
        }
        .btn-gps {
            background-color: #34a853;
            margin-bottom: 15px;
        }
        .btn-gps:hover {
            background-color: #2b803e;
        }
        .note {
            font-size: 0.85rem;
            color: #5f6368;
            margin-bottom: 15px;
            line-height: 1.4;
        }
        .result-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        .result-table th, .result-table td {
            border: 1px solid #e8eaed;
            padding: 12px 8px;
            text-align: center;
            font-size: 0.95rem;
        }
        .result-table th {
            background-color: #f8f9fa;
            color: #5f6368;
            font-weight: 600;
        }
        .highlight {
            font-weight: bold;
            color: #1a73e8;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🌍 지구자기장 분석기</h1>

    <div class="card">
        <h2>1. 위치 정보 입력</h2>
        <button class="btn-gps" onclick="getGPS()">📍 현재 내 위치 자동 입력 (GPS)</button>
        <div class="input-group">
            <label>위도 (Latitude)</label>
            <input type="number" id="lat" step="0.0001" placeholder="예: 37.5665">
        </div>
        <div class="input-group">
            <label>경도 (Longitude)</label>
            <input type="number" id="lon" step="0.0001" placeholder="예: 126.9780">
        </div>
    </div>

    <div class="card">
        <h2>2. 측정값 입력 (단위: µT, °)</h2>
        <p class="note">※ Phyphox 앱에서 스마트폰을 8자 모양으로 돌려 영점을 맞춘 후, 평평한 곳에 두고 측정한 값을 입력하세요.</p>
        <div class="input-group">
            <label>X축 (수평)</label>
            <input type="number" id="valX" step="0.1" placeholder="X값 입력">
        </div>
        <div class="input-group">
            <label>Y축 (수평)</label>
            <input type="number" id="valY" step="0.1" placeholder="Y값 입력">
        </div>
        <div class="input-group">
            <label>Z축 (수직)</label>
            <input type="number" id="valZ" step="0.1" placeholder="Z값 입력">
        </div>
        <p class="note" style="margin-top:15px; margin-bottom:5px;">※ 나침반 앱에서 확인한 각도를 입력하세요.</p>
        <div class="input-group">
            <label>편각 (D)</label>
            <input type="number" id="valDec" step="0.1" placeholder="예: -8.5 (서편각은 -)">
        </div>
        <button onclick="calculateAndCompare()">계산 및 이론값 비교하기</button>
    </div>

    <div class="card" id="resultCard" style="display: none;">
        <h2>3. 분석 결과 비교</h2>
        <table class="result-table">
            <tr>
                <th>구분</th>
                <th>내 측정값</th>
                <th>WMM 이론값</th>
            </tr>
            <tr>
                <td>전자기력 (F)</td>
                <td><span id="myF" class="highlight">-</span> µT</td>
                <td><span id="noaaF">-</span> µT</td>
            </tr>
            <tr>
                <td>수평자기력 (H)</td>
                <td><span id="myH" class="highlight">-</span> µT</td>
                <td><span id="noaaH">-</span> µT</td>
            </tr>
            <tr>
                <td>복각 (I)</td>
                <td><span id="myDip" class="highlight">-</span> °</td>
                <td><span id="noaaDip">-</span> °</td>
            </tr>
            <tr>
                <td>편각 (D)</td>
                <td><span id="myDec" class="highlight">-</span> °</td>
                <td><span id="noaaDec">-</span> °</td>
            </tr>
        </table>
        <p id="statusMsg" class="note" style="margin-top:15px; font-weight:bold; text-align:center;"></p>
    </div>
</div>

<script>
    // 1. GPS 자동 입력 기능
    function getGPS() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    document.getElementById('lat').value = position.coords.latitude.toFixed(4);
                    document.getElementById('lon').value = position.coords.longitude.toFixed(4);
                },
                (error) => { alert('GPS 권한을 허용하거나 직접 숫자를 입력해주세요.'); }
            );
        } else {
            alert("이 브라우저는 GPS를 지원하지 않습니다.");
        }
    }

    // 2. 계산 및 외부 연동 기능
    async function calculateAndCompare() {
        const lat = parseFloat(document.getElementById('lat').value);
        const lon = parseFloat(document.getElementById('lon').value);
        const x = parseFloat(document.getElementById('valX').value);
        const y = parseFloat(document.getElementById('valY').value);
        const z = parseFloat(document.getElementById('valZ').value);
        const dec = parseFloat(document.getElementById('valDec').value);

        if (isNaN(lat) || isNaN(lon) || isNaN(x) || isNaN(y) || isNaN(z) || isNaN(dec)) {
            alert("모든 빈칸(위도, 경도, X, Y, Z, 편각)에 숫자를 입력해주세요.");
            return;
        }

        document.getElementById('resultCard').style.display = 'block';
        document.getElementById('statusMsg').style.color = "blue";
        document.getElementById('statusMsg').innerText = "이론값을 불러오는 중입니다...";

        // [내 측정값 계산 로직]
        const total = Math.sqrt(x*x + y*y + z*z);
        const horizontal = Math.sqrt(x*x + y*y); 
        const dipRad = Math.atan2(z, horizontal);
        const dipDeg = dipRad * (180 / Math.PI);

        document.getElementById('myF').innerText = total.toFixed(2);
        document.getElementById('myH').innerText = horizontal.toFixed(2);
        document.getElementById('myDip').innerText = dipDeg.toFixed(2);
        document.getElementById('myDec').innerText = dec.toFixed(2);

        let theoryTotal = 0, theoryH = 0, theoryDip = 0, theoryDec = 0;
        let successMessage = "";
        let dataLoaded = false;

        // [1차 시도: BGS 공식 서버]
        try {
            const bgsUrl = `https://geomag.bgs.ac.uk/web_service/GMModels/igrf/13?latitude=${lat}&longitude=${lon}&altitude=0&date=2024-01-01&format=json`;
            const res = await fetch(bgsUrl);
            if (res.ok) {
                const data = await res.json();
                if (data && data.magnetic_field) {
                    theoryTotal = data.magnetic_field.total_intensity.value / 1000;
                    theoryH = data.magnetic_field.horizontal_intensity.value / 1000;
                    theoryDip = data.magnetic_field.inclination.value;
                    theoryDec = data.magnetic_field.declination.value;
                    successMessage = "✅ BGS 해외 서버 연동 성공!";
                    dataLoaded = true;
                }
            }
        } catch (e) { console.log("BGS 연결 실패"); }

        // [2차 시도: NOAA 서버 프록시 우회]
        if (!dataLoaded) {
            try {
                const noaaUrl = `https://www.ngdc.noaa.gov/geomag-web/calculators/calculateIgrfwmm?lat1=${lat}&lon1=${lon}&model=WMM&resultFormat=json`;
                const proxyUrl = `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(noaaUrl)}`;
                const res = await fetch(proxyUrl);
                if (res.ok) {
                    const data = await res.json();
                    if (data && data.result) {
                        theoryTotal = data.result[0].totalintensity / 1000;
                        theoryH = data.result[0].horizontalintensity / 1000;
                        theoryDip = data.result[0].inclination;
                        theoryDec = data.result[0].declination;
                        successMessage = "✅ NOAA 해외 서버 연동 성공!";
                        dataLoaded = true;
                    }
                }
            } catch (e) { console.log("NOAA 연결 실패"); }
        }

        // [3차 시도: 한반도 전용 수식 자체 계산 (오프라인 모드)]
        if (!dataLoaded) {
            if (lat >= 30 && lat <= 40 && lon >= 120 && lon <= 135) {
                theoryTotal = 46.5 + (lat - 33.0) * 0.88;
                theoryDip = 48.0 + (lat - 33.0) * 1.11;
                theoryDec = -6.5 - (lat - 33.0) * 0.44; 
                theoryH = theoryTotal * Math.cos(theoryDip * Math.PI / 180); 
                
                successMessage = "⚠️ 통신 차단 감지: 한반도 전용 자체 수식으로 계산 (오프라인 모드)";
                document.getElementById('statusMsg').style.color = "#d84315"; 
                dataLoaded = true;
            } else {
                document.getElementById('statusMsg').style.color = "red";
                document.getElementById('statusMsg').innerHTML = "❌ 오류: 외부 서버 통신 실패 (해외는 자체 계산 불가)";
                return;
            }
        }

        // 결과 화면 표시
        if (dataLoaded) {
            document.getElementById('noaaF').innerText = theoryTotal.toFixed(2);
            document.getElementById('noaaH').innerText = theoryH.toFixed(2);
            document.getElementById('noaaDip').innerText = theoryDip.toFixed(2);
            document.getElementById('noaaDec').innerText = theoryDec.toFixed(2);
            
            if(successMessage.includes("✅")) {
                document.getElementById('statusMsg').style.color = "green";
            }
            document.getElementById('statusMsg').innerText = successMessage;
        }
    }
</script>

</body>
</html>
